name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Validate branch naming convention: <type>/<description>
  # ─────────────────────────────────────────────────────────────────────────────
  validate-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name follows <type>/<description> convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feature|bugfix|chore|hotfix|release|fix|docs|refactor|test|perf)/.+'
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo ""
            echo "❌ Branch name '${BRANCH}' does not follow the required naming convention."
            echo ""
            echo "   Branches must follow the pattern:"
            echo "     <type>/<brief-description>"
            echo ""
            echo "   Allowed types:"
            echo "     feature, bugfix, chore, hotfix, release,"
            echo "     fix, docs, refactor, test, perf"
            echo ""
            echo "   Examples:"
            echo "     ✅  feature/add-use-throttle"
            echo "     ✅  bugfix/fix-debounce-memory-leak"
            echo "     ❌  feature-add-use-throttle   (missing slash)"
            echo "     ❌  my-random-branch           (no type prefix)"
            echo ""
            exit 1
          fi
          echo "✅ Branch name '${BRANCH}' is valid."

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Validate PR title: must start with [major], [minor], or [patch]
  # ─────────────────────────────────────────────────────────────────────────────
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title starts with [major], [minor], or [patch]
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^\[(major|minor|patch)\] .+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo ""
            echo "❌ PR title does not follow the required format."
            echo ""
            echo "   Title must start with one of:"
            echo "     [major] <description>"
            echo "     [minor] <description>"
            echo "     [patch] <description>"
            echo ""
            echo "   Examples:"
            echo "     ✅  [patch] Fix useDebounce cleanup on unmount"
            echo "     ✅  [minor] Add useThrottle hook"
            echo "     ✅  [major] Rename all hooks to new API"
            echo ""
            echo "   Received: '${PR_TITLE}'"
            echo ""
            exit 1
          fi
          echo "✅ PR title '${PR_TITLE}' is valid."

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. ESLint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. TypeScript type-check
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Vitest tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
