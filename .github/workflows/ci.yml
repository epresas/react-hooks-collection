name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Security: Audit dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Validate PR title: must start with [major], [minor], or [patch]
  # ─────────────────────────────────────────────────────────────────────────────
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title contains major, minor, or patch
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Title must start with semver keywords OR conventional commit types
          PATTERN='^((major|minor|patch)|(feat|fix|perf|refactor|chore|docs|test|build|ci))(!?):'
          if ! echo "$PR_TITLE" | grep -qiE "$PATTERN"; then
            echo ""
            echo "❌ PR title must START with a valid prefix (case-insensitive)."
            echo ""
            echo "   Semantic prefixes:"
            echo "     ✅  major: ..., minor: ..., patch: ..."
            echo ""
            echo "   Conventional prefixes (Safety Net):"
            echo "     ✅  feat: (minor), fix: (patch), chore: (patch), etc."
            echo ""
            echo "   Received: '${PR_TITLE}'"
            echo ""
            exit 1
          fi
          echo "✅ PR title '${PR_TITLE}' is valid."

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. ESLint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. TypeScript type-check
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Vitest tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
