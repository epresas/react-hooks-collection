name: Release

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Create a new semver tag based on the PR title prefix [major|minor|patch]
  # ─────────────────────────────────────────────────────────────────────────────
  create-tag:
    name: Create Semver Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to access all tags

      - name: Determine bump type from commit message
        id: bump
        run: |
          # The squash/merge commit message contains the PR title
          MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qiE '^major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^patch'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  No [major|minor|patch] prefix found in commit message."
            echo "   Skipping tag creation."
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          # Get latest semver tag; fall back to version in package.json if no tags exist yet
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [[ -z "$LATEST" ]]; then
            PKG_VERSION=$(node -p "require('./package.json').version")
            LATEST="v${PKG_VERSION}"
            echo "No existing tags — using package.json version as baseline: $LATEST"
          fi
          echo "Latest tag: $LATEST"

          # Strip leading 'v'
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "tag=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MSG=$(git log -1 --pretty=%s)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "$MSG"
          git push origin "$TAG"

          echo "✅ Created and pushed tag $TAG"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MSG=$(git log -1 --pretty=%s)

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "## $TAG

          $MSG

          ---
          _Auto-generated by the Release workflow._"

          echo "✅ GitHub Release created for $TAG"

  publish-npm:
    name: Publish to NPM
    needs: create-tag
    runs-on: ubuntu-latest
    if: needs.create-tag.outputs.tag != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
